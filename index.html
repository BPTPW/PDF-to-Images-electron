<!doctype html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>PDF 转图片</title>
        <link rel="stylesheet" href="/src/app.css" />
    </head>
    <body class="min-w-[640px] text-base-content">
        <main class="mx-auto w-full max-w-4xl px-8">
            <section
                class="rounded-box bg-base-100 p-7"
                aria-label="转换工作区"
            >
                <div class="mt-5 flex items-end justify-between gap-5 pb-5">
                    <form class="flex items-end gap-4" aria-label="导出设置">
                        <label class="form-control w-32">
                            <span class="label-text mb-2 text-sm"
                                >图片格式</span
                            >
                            <select
                                id="format"
                                name="format"
                                class="select select-bordered w-full"
                            >
                                <option value="png" selected>PNG</option>
                                <option value="jpg">JPG</option>
                                <option value="tiff">TIFF</option>
                            </select>
                        </label>
                        <label class="form-control w-28">
                            <span class="label-text mb-2 text-sm">DPI</span>
                            <select
                                id="dpi"
                                name="dpi"
                                class="select select-bordered w-full"
                            >
                                <option value="150">150</option>
                                <option value="200">200</option>
                                <option value="300" selected>300</option>
                                <option value="600">600</option>
                            </select>
                        </label>
                    </form>
                    <div class="flex items-center gap-3">
                        <button
                            id="clear-button"
                            type="button"
                            class="btn btn-error btn-soft btn-sm"
                            disabled
                        >
                            清空列表
                        </button>
                        <button
                            id="browse-directory-button"
                            type="button"
                            class="btn btn-sm"
                        >
                            添加目录
                        </button>
                        <button
                            id="browse-button"
                            type="button"
                            class="btn btn-sm"
                        >
                            添加文件
                        </button>
                    </div>
                </div>
                <div
                    id="drop-zone"
                    class="mt-3 overflow-hidden rounded-box border-2 border-dashed border-base-300 bg-base-200/40 transition-colors hover:border-primary hover:bg-primary/5"
                    aria-label="PDF 文件列表"
                >
                    <ul
                        id="file-list"
                        class="list min-h-44"
                        aria-live="polite"
                    ></ul>
                </div>

                <div class="mt-5 flex justify-end">
                    <button
                        id="convert-button"
                        type="button"
                        class="btn btn-primary"
                        disabled
                    >
                        开始转换
                    </button>
                </div>
            </section>
        </main>
        <dialog id="update-dialog" class="modal">
            <div class="modal-box">
                <h2 id="update-title" class="text-lg font-bold"></h2>
                <p
                    id="current-version"
                    class="mt-1 text-sm text-base-content/60"
                ></p>
                <div class="py-4">
                    <p class="font-medium">更新日志：</p>
                    <div
                        id="update-notes"
                        class="mt-3 max-h-80 overflow-y-auto text-sm leading-6 [&_a]:link [&_code]:rounded [&_code]:bg-base-200 [&_code]:px-1 [&_code]:py-0.5 [&_h1]:mt-4 [&_h1]:text-lg [&_h1]:font-bold [&_h2]:mt-4 [&_h2]:text-base [&_h2]:font-bold [&_li]:ml-5 [&_li]:list-disc [&_ol]:my-2 [&_ol]:list-decimal [&_p]:my-2 [&_pre]:overflow-x-auto [&_pre]:rounded-box [&_pre]:bg-base-200 [&_pre]:p-3 [&_ul]:my-2"
                    ></div>
                </div>
                <div class="modal-action">
                    <form method="dialog">
                        <button type="submit" class="btn">取消</button>
                    </form>
                    <button
                        id="update-button"
                        type="button"
                        class="btn btn-primary"
                    >
                        更新
                    </button>
                </div>
            </div>
            <form method="dialog" class="modal-backdrop">
                <button aria-label="关闭更新提示">关闭</button>
            </form>
        </dialog>
        <dialog id="download-dialog" class="modal">
            <div class="modal-box">
                <h2 id="download-title" class="text-lg font-bold">
                    正在下载更新
                </h2>
                <div class="py-4">
                    <div class="flex items-center gap-3">
                        <progress
                            id="update-progress"
                            class="progress progress-primary min-w-0 flex-1"
                            value="0"
                            max="100"
                        ></progress>
                        <p
                            id="update-progress-percent"
                            class="shrink-0 text-sm font-medium"
                        >
                            0%
                        </p>
                    </div>
                    <div
                        class="mt-3 flex items-center gap-3 whitespace-nowrap text-sm text-base-content/60"
                    >
                        <span id="update-progress-size">0B/--</span>
                        <span id="update-progress-speed">0B/s</span>
                        <span id="update-progress-remaining">--:--</span>
                    </div>
                </div>
                <div class="modal-action">
                    <button id="cancel-update-button" type="button" class="btn">
                        取消
                    </button>
                </div>
            </div>
        </dialog>
        <script type="module" src="/src/renderer.ts"></script>
    </body>
</html>
